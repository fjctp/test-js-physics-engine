<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Matter.js — Forces & Moment demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { height: 100%; margin: 0; background:#0b0e14; }
    #app { width: 100vw; height: 100vh; display: grid; place-items: center; }
    #hint {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #e6e6e6; background:#0008; border:1px solid #fff3;
      padding: 8px 10px; border-radius: 10px;
    }
    canvas { outline: none; }
  </style>
</head>
<body>
  <div id="hint">
    <b>Controls</b>: W/A/S/D = force, Q/E = torque<br/>
    Hold keys to keep applying.
  </div>

  <div id="app"></div>

  <!-- Matter.js -->
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <!-- App logic -->
  <script src="app.js" defer></script>
</body>
</html>
